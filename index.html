<style>
  :root {
    --navy:   #0A1628;
    --navy2:  #0D1F35;
    --navy3:  #112240;
    --teal:   #00897B;
    --teal2:  #00BFA5;
    --teal3:  #64FFDA;
    --gold:   #F4A81D;
    --gold2:  #FFD54F;
    --white:  #E8F0F8;
    --muted:  #8899AA;
    --card:   #0D1F35;
    --border: rgba(0,191,165,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 2px; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 70px;
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-icon { width: 38px; height: 38px; position: relative; }
  .nav-logo-icon svg { width: 100%; height: 100%; }
  .nav-logo-text { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
  .nav-logo-text span { color: var(--gold); }
  .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-family: 'Space Mono', monospace; font-size: .78rem; font-weight: 500; letter-spacing: .5px; transition: color .2s; }
  .nav-links a:hover { color: var(--teal3); }
  .nav-cta { background: transparent; border: 1.5px solid var(--teal2); color: var(--teal2) !important; padding: .45rem 1.2rem; border-radius: 4px; transition: all .2s !important; }
  .nav-cta:hover { background: var(--teal2) !important; color: var(--navy) !important; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 100px 5% 60px; position: relative; overflow: hidden;
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(0,137,123,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,137,123,.06) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(60px); } }
  .hero-glow {
    position: absolute; width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,137,123,.18) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
  }
  .hero-content { position: relative; z-index: 2; max-width: 820px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,191,165,.08); border: 1px solid rgba(0,191,165,.3); color: var(--teal3);
    font-family: 'Space Mono', monospace; font-size: .72rem; letter-spacing: 1.5px;
    padding: .45rem 1rem; border-radius: 100px; margin-bottom: 2rem;
    animation: fadeUp .8s ease both;
  }
  .hero-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--teal3); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(1.4); } }
  .hero-title { font-family: 'Syne', sans-serif; font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 800; line-height: 1.05; letter-spacing: -2px; margin-bottom: 1.5rem; animation: fadeUp .8s .15s ease both; }
  .hero-title .gold { color: var(--gold); }
  .hero-title .teal { color: var(--teal3); }
  .hero-sub { font-size: 1.15rem; line-height: 1.7; color: var(--muted); max-width: 580px; margin: 0 auto 2.5rem; font-weight: 300; animation: fadeUp .8s .3s ease both; }
  .hero-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 4rem; animation: fadeUp .8s .45s ease both; }
  .btn-primary { background: var(--gold); color: var(--navy); border: none; padding: .85rem 2rem; border-radius: 6px; font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: all .2s; letter-spacing: .3px; }
  .btn-primary:hover { background: var(--gold2); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,168,29,.35); }
  .btn-outline { background: transparent; color: var(--teal2); border: 1.5px solid var(--teal2); padding: .85rem 2rem; border-radius: 6px; font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: all .2s; }
  .btn-outline:hover { background: rgba(0,191,165,.1); transform: translateY(-2px); }

  /* ICO BOX */
  .ico-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem 2.5rem; max-width: 620px; margin: 0 auto; position: relative; overflow: hidden; animation: fadeUp .8s .6s ease both; }
  .ico-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--teal), var(--gold), var(--teal2)); }
  .ico-label { font-family: 'Space Mono', monospace; font-size: .7rem; letter-spacing: 2px; color: var(--gold); margin-bottom: .75rem; text-transform: uppercase; }
  .ico-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--white); }
  .countdown { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
  .countdown-unit { display: flex; flex-direction: column; align-items: center; background: rgba(0,137,123,.1); border: 1px solid rgba(0,137,123,.2); border-radius: 8px; padding: .75rem 1.2rem; min-width: 70px; }
  .countdown-num { font-family: 'Space Mono', monospace; font-size: 1.8rem; font-weight: 700; color: var(--teal3); line-height: 1; }
  .countdown-lbl { font-size: .65rem; letter-spacing: 1.5px; color: var(--muted); margin-top: .4rem; font-family: 'Space Mono', monospace; }
  .ico-coming { font-size: .85rem; color: var(--muted); font-style: italic; }
  .ico-coming strong { color: var(--gold); font-style: normal; }

  /* STATS STRIP */
  .stats-strip { display: flex; justify-content: center; flex-wrap: wrap; gap: 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: rgba(13,31,53,.6); backdrop-filter: blur(10px); position: relative; z-index: 2; }
  .stat-item { flex: 1; min-width: 160px; padding: 2rem 1.5rem; text-align: center; border-right: 1px solid var(--border); transition: background .2s; }
  .stat-item:last-child { border-right: none; }
  .stat-item:hover { background: rgba(0,137,123,.05); }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--teal3); display: block; }
  .stat-label { font-size: .8rem; color: var(--muted); letter-spacing: .5px; margin-top: .25rem; font-family: 'Space Mono', monospace; }

  /* SECTIONS SHARED */
  section { padding: 100px 5%; position: relative; z-index: 1; }
  .section-tag { font-family: 'Space Mono', monospace; font-size: .72rem; letter-spacing: 3px; color: var(--teal2); text-transform: uppercase; margin-bottom: .75rem; }
  .section-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 1.25rem; }
  .section-title span { color: var(--gold); }
  .section-sub { color: var(--muted); font-size: 1rem; line-height: 1.7; max-width: 560px; font-weight: 300; }
  .section-header { margin-bottom: 4rem; }

  /* ABOUT */
  #about { background: var(--navy2); }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; max-width: 1100px; margin: 0 auto; }
  .about-visual { position: relative; display: flex; align-items: center; justify-content: center; }
  .hex-visual { width: 300px; height: 300px; position: relative; }
  .hex-visual svg { width: 100%; height: 100%; }
  .about-pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .pillar-card { background: var(--navy3); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; transition: all .3s; position: relative; overflow: hidden; }
  .pillar-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--teal2); transform: scaleY(0); transform-origin: bottom; transition: transform .3s; }
  .pillar-card:hover::before { transform: scaleY(1); }
  .pillar-card:hover { border-color: rgba(0,191,165,.4); transform: translateY(-3px); }
  .pillar-icon { font-size: 1.5rem; margin-bottom: .5rem; }
  .pillar-title { font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; margin-bottom: .35rem; color: var(--white); }
  .pillar-desc { font-size: .8rem; color: var(--muted); line-height: 1.5; }

  /* HOW IT WORKS */
  #how-it-works { background: var(--navy); }
  .pd-step { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 10px; opacity: 0; transform: translateX(-20px); transition: opacity .5s ease, transform .5s ease; }
  .pd-step-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; position: relative; z-index: 2; }
  .pd-step-body { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; flex: 1; transition: border-color .3s, box-shadow .3s; }
  .pd-step-body:hover { border-color: rgba(0,191,165,.3); box-shadow: 0 6px 24px rgba(0,137,123,.1); }
  .pd-step-num { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; }
  .pd-step-title { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--white); margin-bottom: 7px; }
  .pd-step-desc { font-size: .875rem; color: var(--muted); line-height: 1.7; }
  .pd-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 4px 12px; border-radius: 100px; font-size: .7rem; font-weight: 600; }
  .pd-badge-teal { background: rgba(0,137,123,.12); color: var(--teal2); border: 1px solid rgba(0,191,165,.25); }
  .pd-badge-gold { background: rgba(244,168,29,.1); color: var(--gold); border: 1px solid rgba(244,168,29,.25); }
  .pd-badge-teal3 { background: rgba(100,255,218,.08); color: var(--teal3); border: 1px solid rgba(100,255,218,.2); }
  .pd-arrow { padding-left: 75px; margin-bottom: 10px; color: var(--muted); font-size: 16px; opacity: .35; }

  /* TOKENOMICS */
  #tokenomics { background: var(--navy); }
  .token-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; align-items: start; max-width: 1100px; margin: 0 auto; }
  .token-info-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
  .token-supply { font-family: 'Space Mono', monospace; font-size: .72rem; color: var(--muted); letter-spacing: 1px; margin-bottom: .5rem; }
  .token-supply-num { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--gold); }
  .token-supply-label { font-size: .85rem; color: var(--muted); margin-top: .25rem; }
  .token-badges { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1.25rem; }
  .token-badge { background: rgba(0,137,123,.1); border: 1px solid rgba(0,191,165,.25); color: var(--teal2); font-family: 'Space Mono', monospace; font-size: .68rem; padding: .35rem .8rem; border-radius: 100px; letter-spacing: .5px; }
  .alloc-list { display: flex; flex-direction: column; gap: .85rem; }
  .alloc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
  .alloc-name { font-size: .9rem; font-weight: 500; }
  .alloc-pct { font-family: 'Space Mono', monospace; font-size: .85rem; color: var(--gold); font-weight: 700; }
  .alloc-bar { height: 6px; background: rgba(255,255,255,.07); border-radius: 3px; overflow: hidden; }
  .alloc-fill { height: 100%; border-radius: 3px; animation: barFill 1.5s ease both; }
  @keyframes barFill { from { width: 0; } }
  .alloc-sub { font-size: .75rem; color: var(--muted); margin-top: .3rem; }

  /* ROADMAP */
  #roadmap { background: var(--navy2); }
  .roadmap-track { max-width: 900px; margin: 0 auto; position: relative; }
  .roadmap-track::before { content: ''; position: absolute; left: 28px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--teal), var(--gold), transparent); }
  .roadmap-item { display: flex; gap: 2rem; margin-bottom: 3rem; position: relative; }
  .roadmap-dot { width: 58px; height: 58px; border-radius: 50%; background: var(--navy3); border: 2px solid var(--teal); display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; z-index: 1; font-size: 1.2rem; transition: all .3s; }
  .roadmap-item:hover .roadmap-dot { background: var(--teal); box-shadow: 0 0 20px rgba(0,137,123,.5); }
  .roadmap-item.active .roadmap-dot { border-color: var(--gold); background: rgba(244,168,29,.1); box-shadow: 0 0 25px rgba(244,168,29,.3); }
  .roadmap-content { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; flex: 1; transition: all .3s; }
  .roadmap-item:hover .roadmap-content { border-color: rgba(0,191,165,.35); transform: translateX(4px); }
  .roadmap-q { font-family: 'Space Mono', monospace; font-size: .72rem; color: var(--gold); letter-spacing: 2px; margin-bottom: .5rem; }
  .roadmap-phase { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: .75rem; }
  .roadmap-items { list-style: none; }
  .roadmap-items li { font-size: .875rem; color: var(--muted); padding: .3rem 0; padding-left: 1rem; position: relative; line-height: 1.5; }
  .roadmap-items li::before { content: '›'; position: absolute; left: 0; color: var(--teal2); }

  /* TEAM */
  #team { background: var(--navy); }
  .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
  .team-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem 1.5rem; text-align: center; transition: all .3s; position: relative; overflow: hidden; }
  .team-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,137,123,.06), transparent); opacity: 0; transition: opacity .3s; }
  .team-card:hover { transform: translateY(-6px); border-color: rgba(0,191,165,.35); }
  .team-card:hover::after { opacity: 1; }
  .team-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--navy3); border: 2px solid var(--teal); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 1rem; }
  .team-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: .25rem; }
  .team-role { font-family: 'Space Mono', monospace; font-size: .7rem; color: var(--teal2); letter-spacing: 1px; margin-bottom: .75rem; text-transform: uppercase; }
  .team-bio { font-size: .82rem; color: var(--muted); line-height: 1.6; }

  /* WHITEPAPER */
  #whitepaper { background: var(--navy2); text-align: center; }
  .wp-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4rem 3rem; max-width: 700px; margin: 0 auto; position: relative; overflow: hidden; }
  .wp-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--teal), var(--gold), var(--teal2)); }
  .wp-icon { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; }
  .wp-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 1rem; }
  .wp-desc { color: var(--muted); line-height: 1.7; margin-bottom: 2rem; font-weight: 300; }
  .wp-meta { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .wp-meta-item { display: flex; flex-direction: column; align-items: center; gap: .25rem; }
  .wp-meta-val { font-family: 'Space Mono', monospace; font-size: .85rem; color: var(--teal3); font-weight: 700; }
  .wp-meta-key { font-size: .72rem; color: var(--muted); letter-spacing: .5px; }

  /* COLLABORATE */
  #collaborate { background: var(--navy); }
  .collab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; max-width: 1000px; margin: 0 auto; }
  .collab-types { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
  .collab-type { display: flex; gap: 1rem; align-items: flex-start; padding: 1rem 1.25rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px; transition: all .2s; }
  .collab-type:hover { border-color: rgba(0,191,165,.35); transform: translateX(4px); }
  .collab-type-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
  .collab-type-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; margin-bottom: .2rem; }
  .collab-type-desc { font-size: .82rem; color: var(--muted); line-height: 1.5; }
  .collab-form { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; position: relative; overflow: hidden; }
  .collab-form::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--teal)); }
  .form-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: .78rem; color: var(--muted); letter-spacing: .5px; margin-bottom: .4rem; font-family: 'Space Mono', monospace; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--navy3); border: 1px solid var(--border); color: var(--white); padding: .75rem 1rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: .9rem; transition: border-color .2s; outline: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--teal2); box-shadow: 0 0 0 3px rgba(0,191,165,.1); }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-group select option { background: var(--navy2); }

  /* FOOTER */
  footer { background: var(--navy2); border-top: 1px solid var(--border); padding: 3rem 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; }
  .footer-logo { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
  .footer-logo span { color: var(--gold); }

<script>
  // ── HAMBURGER ──
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
  });
  document.querySelectorAll('.mob-link, .mob-cta').forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
    });
  });

  // ── SCROLL REVEAL ──
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) setTimeout(() => e.target.classList.add('visible'), i * 80);
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  // ── COUNTDOWN ──
  function updateCountdown() {
    const now = new Date();
    document.getElementById('cd-sec').textContent = String(59 - (now.getSeconds() % 60)).padStart(2,'0');
    document.getElementById('cd-min').textContent = '--';
    document.getElementById('cd-days').textContent = '--';
    document.getElementById('cd-hrs').textContent = '--';
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // ── NAV SCROLL ──
  window.addEventListener('scroll', () => {
    document.querySelector('nav').style.background = window.scrollY > 50 ? 'rgba(10,22,40,0.97)' : 'rgba(10,22,40,0.85)';
  });

  // ── MAILTO ──
  function sendMailto() {
    const name = document.getElementById('form-name').value.trim();
    const email = document.getElementById('form-email').value.trim();
    const role = document.getElementById('form-role').value || 'Not specified';
    const message = document.getElementById('form-message').value.trim();
    if (!name || !message) { alert('Please fill in your name and message.'); return; }
    const subject = encodeURIComponent('PayDuka Collaboration Enquiry — ' + role);
    const body = encodeURIComponent('Name: ' + name + '\nEmail: ' + email + '\nRole: ' + role + '\n\nMessage:\n' + message);
    window.location.href = 'mailto:info@payduka.xyz?subject=' + subject + '&body=' + body;
  }

  // ── CARD PAYMENT FLOW ANIMATION ──
  (function() {
    var steps = document.querySelectorAll('.pd-step');
    var flowLine = document.getElementById('pd-flow-line');
    var flowAnimated = false;

    function runFlowAnimation() {
      flowLine.style.transition = 'none';
      flowLine.style.height = '0px';
      setTimeout(function() {
        flowLine.style.transition = 'height 3.5s ease';
        var wrapper = document.getElementById('pd-flow-wrapper');
        flowLine.style.height = (wrapper.offsetHeight - 64) + 'px';
      }, 100);
      steps.forEach(function(step, i) {
        step.style.opacity = '0';
        step.style.transform = 'translateX(-20px)';
        setTimeout(function() {
          step.style.opacity = '1';
          step.style.transform = 'translateX(0)';
        }, 300 + i * 400);
      });
    }

    var section = document.getElementById('how-it-works');
    if (section) {
      new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting && !flowAnimated) {
            flowAnimated = true;
            runFlowAnimation();
          }
        });
      }, { threshold: 0.1 }).observe(section);
    }
  })();
</script>
</body>
</html>
