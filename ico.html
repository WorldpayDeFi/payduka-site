<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buy PDuka — PayDuka ICO</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@400;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --green:#00ff88;
  --dark:#060d0a;
  --card:#0c1a13;
  --border:#1a3326;
  --muted:#5a8a72;
}
body { background:var(--dark); color:#fff; font-family:'Syne',sans-serif; margin:0; padding:20px; }
.container { max-width:480px; margin:auto; }
.buy-card {
  background:var(--card);
  border:1px solid var(--border);
  padding:25px;
  border-radius:16px;
}
input {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#111;
  color:#fff;
  font-size:16px;
  margin-top:15px;
}
button {
  width:100%;
  padding:14px;
  margin-top:15px;
  background:var(--green);
  color:#000;
  border:none;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  border-radius:10px;
}
button:disabled { background:#555; cursor:not-allowed; }
.status { margin-top:15px; padding:12px; border-radius:8px; text-align:center; font-size:14px; }
</style>
</head>
<body>

<div class="container">
  <h2>Buy PDuka (Seed Round)</h2>

  <div class="buy-card">
    <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

    <div style="display:flex;gap:10px;margin-top:12px;">
      <a href="https://metamask.app.link/dapp/payduka.xyz" style="flex:1;text-align:center;padding:12px;background:#f6851b;color:#fff;border-radius:10px;text-decoration:none;font-size:13px;">Open in MetaMask</a>
      <a href="https://link.trustwallet.com/open_url?coin_id=137&url=https://payduka.xyz" style="flex:1;text-align:center;padding:12px;background:#3375bb;color:#fff;border-radius:10px;text-decoration:none;font-size:13px;">Open in Trust Wallet</a>
    </div>

    <input id="amountInput" type="number" placeholder="Enter USDC amount (min $10)" oninput="updatePreview()"/>

    <div style="font-size:12px;color:var(--muted);margin:8px 0;">
      Polygon Mainnet • Pay with USDC or POL
    </div>

    <div class="receive-box" style="margin-top:15px;padding:15px;border:1px solid rgba(0,255,136,0.2);border-radius:12px;">
      <strong>You will receive:</strong><br>
      <span id="previewAmount">0 PDuka</span>
    </div>

    <button id="buyBtn" onclick="handleBuy()" disabled>Buy with USDC</button>

    <div id="statusBox" class="status"></div>
  </div>

  <div style="margin-top:20px;font-size:13px;text-align:center;">
    Sale Contract: <a href="https://polygonscan.com/address/0xD8358ba36723b860FFC8E9830060a8Cf348B84d3" target="_blank" style="color:var(--green);">0xD835...B84d3</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.0/ethers.umd.min.js"></script>

<script>
// ================== CONFIG ==================
const ICO_ADDRESS = "0xD8358ba36723b860FFC8E9830060a8Cf348B84d3";
const POLYGON_CHAIN_ID = 137;

let provider;
let signer;
let isConnected = false;

// ================== CONNECT WALLET ==================
async function connectWallet() {
  const statusBox = document.getElementById("statusBox");
  const connectBtn = document.getElementById("connectBtn");

  if (typeof window.ethereum === "undefined") {
    statusBox.innerHTML = "❌ No wallet detected. Please install MetaMask or use Trust Wallet mobile.";
    statusBox.style.color = "red";
    return;
  }

  try {
    statusBox.innerHTML = "Connecting...";
    statusBox.style.color = "orange";

    provider = new ethers.BrowserProvider(window.ethereum);

    // Check current network
    const network = await provider.getNetwork();
    console.log("Current chainId:", Number(network.chainId));

    if (Number(network.chainId) !== POLYGON_CHAIN_ID) {
      statusBox.innerHTML = "Switching to Polygon Mainnet...";
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0x89' }]
        });
      } catch (switchError) {
        // If user rejects or chain not added
        statusBox.innerHTML = "Please switch to Polygon Mainnet manually in your wallet.";
        statusBox.style.color = "red";
        return;
      }
    }

    // Request accounts
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    
    signer = await provider.getSigner();
    const address = await signer.getAddress();

    isConnected = true;
    connectBtn.textContent = "✅ Connected (" + address.slice(0,6) + "...)";
    connectBtn.disabled = true;

    document.getElementById("buyBtn").disabled = false;
    document.getElementById("buyBtn").textContent = "Buy with USDC";

    statusBox.innerHTML = "✅ Wallet connected successfully on Polygon!";
    statusBox.style.color = "var(--green)";

    console.log("Connected address:", address);

  } catch (err) {
    console.error("Connection error:", err);
    let msg = "Connection failed.";
    
    if (err.code === 4001) msg = "User rejected the request.";
    else if (err.message.includes("rejected")) msg = "Connection rejected.";
    
    statusBox.innerHTML = "❌ " + msg;
    statusBox.style.color = "red";
  }
}

// Simple preview (fallback)
function updatePreview() {
  const val = parseFloat(document.getElementById("amountInput").value) || 0;
  const pduka = val > 0 ? (val / 0.005).toLocaleString() : "0";
  document.getElementById("previewAmount").textContent = pduka + " PDuka";
}

// ================== BUY (placeholder) ==================
async function handleBuy() {
  if (!isConnected) {
    document.getElementById("statusBox").innerHTML = "Please connect wallet first";
    return;
  }
  document.getElementById("statusBox").innerHTML = "Buy function ready. Test small amount first.";
  // We'll add full buyWithUSDC + buyWithPOL later once connection works
}

</script>
</body>
        </html>
