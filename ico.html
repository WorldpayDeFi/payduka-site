<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buy PDuka — PayDuka ICO</title><link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@400;700&display=swap" rel="stylesheet"/><style>
:root {
  --green:#00ff88;
  --dark:#060d0a;
  --card:#0c1a13;
  --border:#1a3326;
  --muted:#5a8a72;
}

html { font-size: clamp(14px,1.1vw,16px); }

body {
  background:var(--dark);
  color:#fff;
  font-family:'Syne',sans-serif;
}

.container {
  max-width:480px;
  margin:auto;
  padding:20px;
}

.buy-card {
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
  border-radius:16px;
}

input {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#111;
  color:#fff;
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  background:var(--green);
  border:none;
  font-weight:bold;
}

.receive-box {
  margin-top:15px;
  padding:15px;
  border:1px solid rgba(0,255,136,0.2);
  border-radius:12px;
}
</style></head><body><div class="container"><h2>Buy PDuka</h2><div class="buy-card"><button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

<input id="amountInput" type="number" placeholder="Enter amount" oninput="updatePreview()" /><div style="font-size:11px;color:var(--muted);margin-top:8px;">
Min: $10 · Max: $50,000
</div><div class="receive-box">
<div>Transaction Preview</div>
<div id="previewAmount">0 PDuka</div>
<div id="usdValue">≈ $0.00</div>
<div style="font-size:11px;color:var(--muted)">Rate from smart contract</div>
</div><button id="buyBtn" onclick="handleBuy()" disabled>Connect Wallet</button>

<div id="statusBox"></div></div><div style="margin-top:20px;font-size:12px;">
Contract:
<span id="icoAddrDisplay"></span>
</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script><script type="module">
import { createWeb3Modal, defaultConfig } from 'https://esm.sh/@web3modal/ethers@4.2.3';

const ICO_ADDRESS="0xD8358ba36723b860FFC8E9830060a8Cf348B84d3";
const USDC_ADDRESS="0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359";

const ICO_ABI=[
"function previewUSDCPurchase(uint256 usdcAmount) view returns(uint256)",
"function getPolPrice() view returns(uint256)",
"function buyWithUSDC(uint256 usdcAmount)",
"function buyWithPOL() payable"
];

const ERC20_ABI=[
"function approve(address spender,uint256 amount)",
"function allowance(address owner,address spender) view returns(uint256)"
];

const modal=createWeb3Modal({
 ethersConfig: defaultConfig({ metadata:{name:"PayDuka"} }),
 chains:[{chainId:137,name:"Polygon",rpcUrl:"https://polygon-rpc.com"}],
 projectId:"43be1849d143d71c315a15e959bd6932"
});

let walletConnected=false;
let polPriceUSD=0;
let currentTab="USDC";
let previewTimeout;

document.getElementById('icoAddrDisplay').innerHTML=
`<a href="https://polygonscan.com/address/${ICO_ADDRESS}" target="_blank">
${ICO_ADDRESS.slice(0,6)}...${ICO_ADDRESS.slice(-4)}
</a>`;

async function loadPrice(){
 const rpc=new ethers.JsonRpcProvider("https://polygon-rpc.com");
 const ico=new ethers.Contract(ICO_ADDRESS,ICO_ABI,rpc);
 const price=await ico.getPolPrice();
 polPriceUSD=Number(price)/1e8;
}
loadPrice();

window.connectWallet=async()=>{await modal.open();};

modal.subscribeProvider(async({isConnected})=>{
 if(isConnected){
  walletConnected=true;
  document.getElementById('buyBtn').disabled=false;
  document.getElementById('buyBtn').textContent="Buy PDuka";
 }
});

window.updatePreview=function(){
 clearTimeout(previewTimeout);

 previewTimeout=setTimeout(async()=>{
  const val=parseFloat(document.getElementById('amountInput').value)||0;

  if(val<=0){
    document.getElementById('previewAmount').textContent="0 PDuka";
    document.getElementById('usdValue').textContent="≈ $0.00";
    return;
  }

  try{
    const rpc=new ethers.JsonRpcProvider("https://polygon-rpc.com");
    const ico=new ethers.Contract(ICO_ADDRESS,ICO_ABI,rpc);

    let usd=0;
    let pduka=0;

    if(currentTab==="USDC"){
      const usdcAmount=ethers.parseUnits(val.toString(),6);
      const result=await ico.previewUSDCPurchase(usdcAmount);

      pduka=Number(ethers.formatEther(result));
      usd=val;
    } else {
      usd=val*polPriceUSD;
      const usdcEquivalent=ethers.parseUnits(usd.toFixed(6),6);
      const result=await ico.previewUSDCPurchase(usdcEquivalent);

      pduka=Number(ethers.formatEther(result));
    }

    document.getElementById('previewAmount').textContent=
      pduka.toLocaleString()+" PDuka";

    document.getElementById('usdValue').textContent=
      "≈ $"+usd.toFixed(2);

  }catch(e){
    console.error(e);
  }

 },300);
};

window.handleBuy=async function(){
 if(!walletConnected){await modal.open();return;}

 const val=document.getElementById('amountInput').value;
 if(!val) return alert("Enter amount");

 const provider=new ethers.BrowserProvider(modal.getWalletProvider());
 const signer=await provider.getSigner();

 const ico=new ethers.Contract(ICO_ADDRESS,ICO_ABI,signer);
 const usdc=new ethers.Contract(USDC_ADDRESS,ERC20_ABI,signer);

 const amount=ethers.parseUnits(val,6);
 const addr=await signer.getAddress();

 const allowance=await usdc.allowance(addr,ICO_ADDRESS);

 if(allowance<amount){
   const tx=await usdc.approve(ICO_ADDRESS,amount);
   await tx.wait();
 }

 const tx=await ico.buyWithUSDC(amount);
 await tx.wait();

 document.getElementById('statusBox').textContent="✅ Purchase successful";
};
</script></body>
</html>
